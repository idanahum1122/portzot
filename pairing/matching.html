<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#ec4899">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="../icon/favicon.png">
    <title>מנוע שותפות - פורצות דרך</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255,20,147,0.15) 0%, transparent 70%);
            pointer-events: none;
            animation: pulseGlow 4s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        h1 {
            text-align: center;
            color: #ff1493;
            text-shadow: 0 0 20px rgba(255,20,147,0.7);
            margin-bottom: 40px;
        }

        .card {
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid #ff1493;
            border-radius: 16px;
            padding: 24px;
            margin: 0 auto 24px;
            max-width: 500px;
            box-shadow: 0 0 30px rgba(255,20,147,0.3);
        }

        button {
            width: 100%;
            margin: 0 auto;
            display: block;
            padding: 12px 20px;
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255,20,147,0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,20,147,0.6);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results {
            display: none;
            max-width: 700px;
            margin: 0 auto;
        }

        .results.show {
            display: block;
        }

        .pair {
            background: rgba(255,20,147,0.1);
            border: 1px solid #ff1493;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .pair h3 {
            color: #ff69b4;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .pair-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pair-names {
            flex: 1;
            font-size: 15px;
        }

        .score {
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .error {
            background: rgba(255,50,50,0.2);
            border: 1px solid #ff3232;
            border-radius: 8px;
            padding: 16px;
            color: #ff6b6b;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 מנוע שותפות 🎯</h1>

        <div class="card">
            <button id="runButton" onclick="runMatching()">💝 הפעילי מנוע למציאת שותפויות</button>
            <div class="error" id="error"></div>
        </div>

        <div class="loading" id="loading">
            <p>⏳ מחשב שותפויות אופטימליות...</p>
        </div>

        <div class="results" id="results"></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, query, where, getDocs, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCFSq5b-HgkTxFNhBJIBdOe2ian5TZvMPE",
            authDomain: "portzot-derech.firebaseapp.com",
            projectId: "portzot-derech",
            storageBucket: "portzot-derech.firebasestorage.app",
            messagingSenderId: "236417614890",
            appId: "1:236417614890:web:587b0eb3c5eedfa352af53"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        db._settings.experimentalForceLongPolling = true;
        console.log("✅ Firestore connection: OK");

        // קבלת session מה-URL
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');
        
        // הגדרת showError לפני השימוש
        function showError(message) {
            document.getElementById('error').textContent = message;
            document.getElementById('error').classList.add('show');
            document.getElementById('loading').classList.remove('show');
            document.getElementById('runButton').disabled = false;
        }

        // הגדרת runMatching
        window.runMatching = async function() {
            // קבלת session מה-URL בזמן לחיצה
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('session');
            
            if (!sessionId) {
                showError('שגיאה: לא נמצא קוד פעילות. נא לגשת דרך admin.html');
                return;
            }

            console.log('🚀 מתחיל זיווג עבור session:', sessionId);
            document.getElementById('runButton').disabled = true;
            document.getElementById('loading').classList.add('show');
            document.getElementById('error').classList.remove('show');
            document.getElementById('results').classList.remove('show');

            try {
                // שליפת כל התשובות של הסשן
                const responsesQuery = query(
                    collection(db, 'responses'),
                    where('sessionId', '==', sessionId)
                );
                const snapshot = await getDocs(responsesQuery);

                if (snapshot.empty) {
                    showError('לא נמצאו תשובות לפעילות זו');
                    return;
                }

                const responses = [];
                snapshot.forEach(doc => {
                    responses.push({ id: doc.id, ...doc.data() });
                });

                console.log(`📊 נמצאו ${responses.length} תשובות`);

                // הרצת אלגוריתם הזיווג
                const pairs = pickBestPairs(responses);

                // שמירה ב-Firestore
                await setDoc(doc(db, 'pairings', sessionId), {
                    sessionId: sessionId,
                    pairs: pairs,
                    totalParticipants: responses.length,
                    createdAt: new Date().toISOString()
                });

                console.log('✅ זיווגים נשמרו ב-Firestore');

                // הצגת התוצאות
                displayResults(pairs);

            } catch (error) {
                console.error('❌ Error:', error);
                showError('שגיאה בחישוב הזיווגים: ' + error.message);
            } finally {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('runButton').disabled = false;
            }
        };

        function calculateScore(a, b) {
            let totalScore = 0;
            const reasons = [];

            // תחומי עניין (30 נקודות)
            if (a.mainDomain === b.mainDomain) {
                totalScore += 15;
                reasons.push(`שתיכן בחרתן ב-${a.mainDomain} כתחום עיקרי`);
            }
            
            if (a.mainDomain === b.secondDomain && b.secondDomain !== "אני מעדיפה להתמקד בתחום אחד") {
                totalScore += 8;
            }
            if (b.mainDomain === a.secondDomain && a.secondDomain !== "אני מעדיפה להתמקד בתחום אחד") {
                totalScore += 8;
            }
            
            if (a.secondDomain === b.secondDomain && a.secondDomain !== "אני מעדיפה להתמקד בתחום אחד") {
                totalScore += 5;
            }

            // סגנון עבודה (25 נקודות)
            if (a.workStyle !== b.workStyle) {
                totalScore += 8;
                reasons.push('סגנונות עבודה משלימים');
            }
            
            if (a.teamStyle !== b.teamStyle) {
                totalScore += 7;
            }
            
            if (a.workPace === b.workPace) {
                totalScore += 5;
            }

            // תפקיד בצוות (20 נקודות)
            if (a.teamRole !== b.teamRole) {
                totalScore += 7;
            }
            
            if (a.motivationSource === b.motivationSource) {
                totalScore += 6;
                reasons.push('אותה מוטיבציה מניעה את שתיכן');
            }

            // תקשורת (25 נקודות)
            if ((a.pressureResponse === "אני פועלת הכי טוב תחת לחץ - זה מניע אותי" && 
                 b.pressureResponse === "אני צריכה לתכנן מראש כדי למנוע לחץ") ||
                (b.pressureResponse === "אני פועלת הכי טוב תחת לחץ - זה מניע אותי" && 
                 a.pressureResponse === "אני צריכה לתכנן מראש כדי למנוע לחץ")) {
                totalScore += 9;
                reasons.push('איזון מושלם בניהול לחץ');
            }
            
            if (a.conflictStyle === b.conflictStyle) {
                totalScore += 8;
            }
            
            if (a.communicationStyle === b.communicationStyle) {
                totalScore += 8;
                reasons.push('אותו סגנון תקשורת מועדף');
            }

            // תחומי עניין אישיים (10 נקודות)
            if (a.lifeInterest === b.lifeInterest) {
                totalScore += 4;
            }

            // כפל לפי חשיבות
            let multiplier = 1;
            if (a.importanceLevel === "מאוד חשוב - אני רוצה התאמה הכי טובה" ||
                b.importanceLevel === "מאוד חשוב - אני רוצה התאמה הכי טובה") {
                multiplier = 1.3;
            }
            
            totalScore = totalScore * multiplier;

            return { totalScore: Math.round(totalScore * 100) / 100, reasons };
        }

        function pickBestPairs(participants) {
            const n = participants.length;
            const pairs = [];
            const used = new Set();

            // מיפוי כל הזוגות
            const scores = [];
            for (let i = 0; i < n; i++) {
                for (let j = i + 1; j < n; j++) {
                    const result = calculateScore(participants[i], participants[j]);
                    scores.push({ 
                        i, j, 
                        scoreValue: result.totalScore, 
                        reasons: result.reasons 
                    });
                }
            }

            // מיון מהגבוה לנמוך
            scores.sort((a, b) => b.scoreValue - a.scoreValue);

            // בחירה greedy
            for (const { i, j, scoreValue, reasons } of scores) {
                if (!used.has(i) && !used.has(j)) {
                    pairs.push({
                        person1: participants[i].displayName,
                        person2: participants[j].displayName,
                        score: scoreValue,
                        reasons: reasons,
                        isTeam: false
                    });
                    used.add(i);
                    used.add(j);
                }
            }

            // טיפול במספר אי-זוגי
            if (used.size < n) {
                const leftOverIndices = [];
                for (let i = 0; i < n; i++) {
                    if (!used.has(i)) {
                        leftOverIndices.push(i);
                    }
                }
                
                if (leftOverIndices.length > 0) {
                    const leftOverParticipants = leftOverIndices.map(i => participants[i]);
                    
                    let teamScore = 0;
                    let teamReasons = [];
                    
                    if (leftOverParticipants.length === 3) {
                        const score_ab = calculateScore(leftOverParticipants[0], leftOverParticipants[1]);
                        const score_ac = calculateScore(leftOverParticipants[0], leftOverParticipants[2]);
                        const score_bc = calculateScore(leftOverParticipants[1], leftOverParticipants[2]);
                        
                        teamScore = Math.round((score_ab.totalScore + score_ac.totalScore + score_bc.totalScore) / 3);
                        teamReasons = [
                            `ציון ממוצע של הצוות: ${teamScore} נקודות`
                        ];
                    } else if (leftOverParticipants.length === 2) {
                        const pairScore = calculateScore(leftOverParticipants[0], leftOverParticipants[1]);
                        teamScore = pairScore.totalScore;
                        teamReasons = pairScore.reasons;
                    }
                    
                    pairs.push({
                        person1: leftOverParticipants[0]?.displayName || null,
                        person2: leftOverParticipants[1]?.displayName || null,
                        person3: leftOverParticipants[2]?.displayName || null,
                        score: teamScore,
                        reasons: teamReasons,
                        isTeam: leftOverParticipants.length === 3,
                        isLeftover: leftOverParticipants.length === 1
                    });
                }
            }

            return pairs;
        }

        function displayResults(pairs) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="card" style="max-width: 700px; margin: 0 auto 16px; padding: 20px;"><h2 style="font-size: 20px; margin: 0;">📊 תוצאות השותפויות</h2></div>';

            pairs.forEach((pair, index) => {
                const pairDiv = document.createElement('div');
                pairDiv.className = 'pair';

                if (pair.isTeam) {
                    const members = [pair.person1, pair.person2, pair.person3].filter(Boolean);
                    pairDiv.innerHTML = `
                        <h3>צוות ${index + 1} (3 משתתפות)</h3>
                        <div class="pair-info">
                            <div class="pair-names">
                                <p>${members.join(' 💖 ')}</p>
                            </div>
                            <div class="score">${pair.score}</div>
                        </div>
                    `;
                } else if (pair.isLeftover) {
                    pairDiv.innerHTML = `
                        <h3>משתתפת נוספת</h3>
                        <div class="pair-info">
                            <div class="pair-names">
                                <p>${pair.person1}</p>
                            </div>
                        </div>
                    `;
                } else {
                    pairDiv.innerHTML = `
                        <h3>זוג ${index + 1}</h3>
                        <div class="pair-info">
                            <div class="pair-names">
                                <p>${pair.person1} 💖 ${pair.person2}</p>
                            </div>
                            <div class="score">${pair.score}</div>
                        </div>
                    `;
                }

                resultsDiv.appendChild(pairDiv);
            });

            resultsDiv.classList.add('show');
        }

        // הרצה אוטומטית אם יש session ב-URL
        const urlParams2 = new URLSearchParams(window.location.search);
        const sessionFromURL = urlParams2.get('session');
        
        if (sessionFromURL) {
            console.log('🎯 Session ID נמצא ב-URL:', sessionFromURL);
            setTimeout(() => {
                console.log('▶️ מריץ זיווג אוטומטי...');
                runMatching();
            }, 500);
        } else {
            console.log('⚠️ אין session ב-URL. המתנים ללחיצה על הכפתור...');
        }
    </script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function() {
      navigator.serviceWorker.register("../service-worker.js").catch(function(error) {
        console.error("Service worker registration failed:", error);
      });
    });
  }
</script>

</body>
</html>
