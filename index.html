<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon/favicon.png" />
  <link rel="shortcut icon" href="icon/favicon.ico" />
  <meta name="theme-color" content="#ec4899" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="פורצות דרך" />
  <link rel="apple-touch-icon" href="icon/favicon.png" />
  <title>פורצות דרך</title>
  <style>
    @font-face {
      font-family: 'Choco';
      src: url('fonts/Choco.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }

    :root{
      --bg-dark:#0f1738;
      --bg-dark-2:#1a2555;
      --card-top:#f8f0f4;
      --card-mid:#f4e6ee;
      --card-bottom:#efd1e0;
      --primary:#e45a9f;
      --primary-dark:#7c4d90;
      --text:#665d78;
      --shadow:0 20px 50px rgba(0,0,0,0.18);
      --radius:28px;
      --danger:#c93d70;
    }

    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
    }

    body{
      font-family:"Heebo", Arial, sans-serif;
      background:
        radial-gradient(circle at top, var(--bg-dark-2) 0%, var(--bg-dark) 48%, #0a1028 100%);
    }

    .page{
      width:100%;
      height:100svh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
      overflow:hidden;
    }

    .shell{
      width:min(450px, 100%);
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .card{
      width:100%;
      max-height:min(97svh, 920px);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0.08) 16%, rgba(255,255,255,0) 28%),
        linear-gradient(to bottom, var(--card-top) 0%, var(--card-mid) 56%, var(--card-bottom) 100%);
      border-radius:var(--radius);
      box-shadow:
        0 20px 50px rgba(0,0,0,0.18),
        inset 0 1px 0 rgba(255,255,255,0.55),
        inset 0 -10px 30px rgba(125, 77, 144, 0.05);
      border:1px solid rgba(255,255,255,0.28);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      position:relative;
    }

    .content{
      width:100%;
      max-width:480px;
      text-align:center;
      color:var(--text);
      padding:68px 24px 62px;
      position:relative;
      z-index:1;
    }

    .hero-img{
      width:118px;
      max-width:100%;
      display:block;
      margin:0 auto 16px;
      object-fit:contain;
      filter:drop-shadow(0 10px 18px rgba(122, 76, 145, 0.16));
    }

    h1{
      margin:0 0 14px;
      font-size:clamp(42px, 6vw, 64px);
      line-height:1.02;
      font-family:'Choco', Arial, sans-serif;
      font-weight:700;
      color:var(--primary);
      letter-spacing:0;
    }

    .subtitle{
      margin:0 0 18px;
      font-size:clamp(23px, 3vw, 32px);
      line-height:1.25;
      font-family:'Choco', Arial, sans-serif;
      font-weight:700;
      color:var(--primary-dark);
    }

    .desc{
      margin:0 auto 24px;
      max-width:420px;
      font-size:clamp(18px, 1.95vw, 22px);
      line-height:1.7;
      font-weight:500;
      color:#6b607e;
    }

    .enter-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:116px;
      padding:8px 12px;
      border:none;
      border-radius:999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0.06) 38%, rgba(255,255,255,0) 39%),
        linear-gradient(135deg, #ef70b1 0%, #dc5aa8 35%, #bf4e9d 68%, #8d4daf 100%);
      color:#fff;
      font-family:"Heebo", Arial, sans-serif;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      box-shadow:
        0 10px 20px rgba(202,84,161,0.24),
        0 3px 8px rgba(141,77,175,0.18),
        inset 0 1px 0 rgba(255,255,255,0.42),
        inset 0 -1px 0 rgba(126,55,124,0.28);
      transition:
        transform .18s ease,
        box-shadow .18s ease,
        filter .18s ease;
      position:relative;
    }

    .enter-btn:hover{
      transform:translateY(-1px);
      box-shadow:
        0 14px 24px rgba(202,84,161,0.28),
        0 4px 10px rgba(141,77,175,0.22),
        inset 0 1px 0 rgba(255,255,255,0.46),
        inset 0 -1px 0 rgba(126,55,124,0.30);
      filter:saturate(1.03);
    }

    .enter-btn:active{
      transform:translateY(0);
      box-shadow:
        0 8px 14px rgba(202,84,161,0.20),
        inset 0 1px 0 rgba(255,255,255,0.34);
    }

    .gate-note{
      margin-top:11px;
      font-size:13px;
      color:#7f6d88;
      font-weight:500;
      line-height:1.45;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(9, 14, 36, 0.58);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:999;
      backdrop-filter:blur(3px);
    }

    .modal.show{
      display:flex;
    }

    .modal-card{
      width:min(400px, 100%);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.34) 0%, rgba(255,255,255,0.08) 18%, rgba(255,255,255,0) 28%),
        linear-gradient(to bottom, #fbf3f6 0%, #f4e5ed 100%);
      border-radius:22px;
      box-shadow:0 22px 48px rgba(0,0,0,0.22);
      border:1px solid rgba(255,255,255,0.35);
      padding:24px 20px 20px;
      text-align:center;
    }

    .modal-title{
      margin:0 0 8px;
      color:var(--primary);
      font-size:28px;
      font-family:'Choco', Arial, sans-serif;
      font-weight:700;
    }

    .modal-text{
      margin:0 0 14px;
      color:#6b5f7f;
      font-size:16px;
      line-height:1.6;
      font-weight:500;
    }

    .code-input{
      width:100%;
      height:46px;
      border:2px solid #e3cada;
      border-radius:12px;
      padding:0 14px;
      background:#fff;
      color:#4f4862;
      font-family:inherit;
      font-size:17px;
      text-align:center;
      outline:none;
      margin-bottom:10px;
      box-shadow:inset 0 1px 3px rgba(0,0,0,0.04);
    }

    .code-input:focus{
      border-color:#cb54a1;
      box-shadow:
        0 0 0 4px rgba(203,84,161,0.12),
        inset 0 1px 3px rgba(0,0,0,0.04);
    }

    .error-msg{
      min-height:22px;
      margin-bottom:10px;
      color:var(--danger);
      font-size:14px;
      font-weight:700;
    }

    .modal-actions{
      display:flex;
      gap:8px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .btn{
      min-width:104px;
      height:42px;
      border:none;
      border-radius:999px;
      font-family:inherit;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
    }

    .btn-primary{
      background:linear-gradient(135deg, #ea64aa 0%, #ca54a1 50%, #8d4daf 100%);
      color:#fff;
      box-shadow:0 8px 16px rgba(202,84,161,0.18);
    }

    .btn-secondary{
      background:#fff;
      color:#6b5f7f;
      border:1px solid #ead6e1;
    }

    @media (max-width:640px){
      .page{
        padding:10px;
      }

      .card{
        max-height:97svh;
        border-radius:22px;
      }

      .content{
        padding:42px 18px 34px;
      }

      .hero-img{
        width:90px;
        margin-bottom:12px;
      }

      h1{
        font-size:38px;
        margin-bottom:10px;
      }

      .subtitle{
        font-size:22px;
        margin-bottom:14px;
      }

      .desc{
        font-size:16px;
        line-height:1.58;
        margin-bottom:20px;
        max-width:340px;
      }

      .enter-btn{
        min-width:108px;
        padding:7px 10px;
        font-size:11px;
      }

      .gate-note{
        font-size:12px;
      }

      .modal-card{
        padding:20px 16px 16px;
        border-radius:18px;
      }

      .modal-title{
        font-size:24px;
      }

      .modal-text{
        font-size:15px;
      }

      .code-input{
        height:44px;
        font-size:16px;
      }

      .btn{
        width:100%;
      }
    }

    @media (max-height:700px){
      .hero-img{
        width:82px;
        margin-bottom:10px;
      }

      h1{
        font-size:36px;
        margin-bottom:8px;
      }

      .subtitle{
        font-size:20px;
        margin-bottom:10px;
      }

      .desc{
        font-size:16px;
        line-height:1.55;
        margin-bottom:18px;
      }

      .content{
        padding:34px 18px 28px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="shell">
      <section class="card">
        <div class="content">
          <img class="hero-img" src="icon/logo.png" alt="פורצות דרך" />

          <h1>פורצות דרך</h1>

          <p class="subtitle">ברוכה הבאה לאתר הקורס</p>

          <p class="desc">
            מקום לעצור לרגע, לנשום,<br>
            להקשיב לעצמך — ולגלות מה חשוב לך באמת.
          </p>

          <button class="enter-btn" id="openGateBtn" type="button">
            כניסה לאתר
          </button>

          <div class="gate-note">הכניסה למרחב הפנימי מתבצעת באמצעות קוד גישה</div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal" id="gateModal" aria-hidden="true">
    <div class="modal-card">
      <h2 class="modal-title">כניסה לאתר</h2>
      <p class="modal-text">כדי להמשיך, יש להזין קוד כניסה.</p>

      <input
        id="accessCode"
        class="code-input"
        type="password"
        placeholder="הזיני קוד"
        autocomplete="off"
      />

      <div class="error-msg" id="errorMsg"></div>

      <div class="modal-actions">
        <button class="btn btn-primary" id="submitCodeBtn" type="button">כניסה</button>
        <button class="btn btn-secondary" id="closeModalBtn" type="button">ביטול</button>
      </div>
    </div>
  </div>

  <script>
    const CORRECT_CODE = "1234";
    const SESSION_KEY = "stronger_gate_2026";

    const openGateBtn = document.getElementById("openGateBtn");
    const gateModal = document.getElementById("gateModal");
    const accessCode = document.getElementById("accessCode");
    const submitCodeBtn = document.getElementById("submitCodeBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const errorMsg = document.getElementById("errorMsg");

    function openModal() {
      gateModal.classList.add("show");
      gateModal.setAttribute("aria-hidden", "false");
      errorMsg.textContent = "";
      accessCode.value = "";
      setTimeout(() => accessCode.focus(), 80);
    }

    function closeModal() {
      gateModal.classList.remove("show");
      gateModal.setAttribute("aria-hidden", "true");
      errorMsg.textContent = "";
      accessCode.value = "";
    }

    function submitCode() {
      const value = accessCode.value.trim();

      if (value === CORRECT_CODE) {
        sessionStorage.setItem(SESSION_KEY, "ok");
        window.location.href = "strongermenu-2026.html";
        return;
      }

      errorMsg.textContent = "הקוד שהוזן אינו נכון.";
      accessCode.focus();
      accessCode.select();
    }

    openGateBtn.addEventListener("click", openModal);
    closeModalBtn.addEventListener("click", closeModal);
    submitCodeBtn.addEventListener("click", submitCode);

    accessCode.addEventListener("keydown", function(e) {
      if (e.key === "Enter") submitCode();
    });

    gateModal.addEventListener("click", function(e) {
      if (e.target === gateModal) closeModal();
    });

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape" && gateModal.classList.contains("show")) {
        closeModal();
      }
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function() {
        navigator.serviceWorker.register("./service-worker.js").catch(function(error) {
          console.error("Service worker registration failed:", error);
        });
      });
    }
  </script>
</body>
</html>
